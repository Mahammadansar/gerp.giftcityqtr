<div class="portal-content">
  <div class="row mb-4">
    <div class="col-12">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 page-header-modern">
        <div>
          <h2>{{ title }}</h2>
          <p class="text-muted mb-0">{{ subtitle }}</p>
        </div>
        <div class="d-flex align-items-center gap-2">
          <span class="text-muted small">{{ period }}</span>
          <button type="button" class="btn btn-outline-secondary btn-sm" (click)="refresh()">
            <i class="feather icon-refresh-cw me-1"></i>Refresh
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <h5 class="fw-semibold mb-3">Revenue</h5>
      <table class="table table-modern mb-4">
        <tbody>
          <tr *ngFor="let r of revenue"><td>{{ r.label }}</td><td class="text-end fw-semibold">{{ r.amount | number }} AED</td></tr>
          <tr class="border-top"><td class="fw-bold">Total Revenue</td><td class="text-end fw-bold">{{ totalRevenue | number }} AED</td></tr>
        </tbody>
      </table>
      <h5 class="fw-semibold mb-3">Expenses</h5>
      <table class="table table-modern mb-4">
        <tbody>
          <tr *ngFor="let e of expenses"><td>{{ e.label }}</td><td class="text-end fw-semibold">{{ e.amount | number }} AED</td></tr>
          <tr class="border-top"><td class="fw-bold">Total Expenses</td><td class="text-end fw-bold">{{ totalExpenses | number }} AED</td></tr>
        </tbody>
      </table>
      <div class="border-top pt-3">
        <div class="d-flex justify-content-between fw-bold fs-5">
          <span>Net Profit</span>
          <span class="text-success">{{ netProfit | number }} AED</span>
        </div>
      </div>
    </div>
  </div>
</div>
