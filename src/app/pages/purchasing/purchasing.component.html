<div class="portal-content">
  <div class="row mb-4">
    <div class="col-12">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 page-header-modern">
        <div>
          <h2>{{ title }}</h2>
          <p class="text-muted mb-0">{{ subtitle }}</p>
        </div>
        <span class="demo-badge-page"><i class="feather icon-info me-1"></i>Demo Data</span>
      </div>
    </div>
  </div>

  <div class="card table-card-modern">
    <div class="card-header border-0 bg-light py-3">
      <h5 class="mb-0 fw-semibold">Purchase Orders</h5>
    </div>
    <div class="table-responsive">
      <table class="table table-modern table-hover mb-0">
        <thead>
          <tr>
            <th>PO No</th>
            <th>Date</th>
            <th>Vendor</th>
            <th>Items</th>
            <th class="text-end">Total</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let o of orders">
            <td><span class="ref-badge">{{ o.poNo }}</span></td>
            <td>{{ o.date }}</td>
            <td>{{ o.vendor }}</td>
            <td><span class="text-muted small">{{ o.items }}</span></td>
            <td class="text-end fw-semibold">{{ o.total | number:'1.0-0' }} {{ o.currency }}</td>
            <td>
              <span class="status-badge-modern" [ngClass]="{
                'status-approved': o.status === 'Received' || o.status === 'Approved',
                'status-pending': o.status === 'Pending'
              }">{{ o.status }}</span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
