<div class="portal-content">
  <div class="row mb-4">
    <div class="col-12">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 page-header-modern">
        <div><h2>{{ title }}</h2><p class="text-muted mb-0">{{ subtitle }}</p></div>
        <button type="button" class="btn btn-outline-secondary btn-sm" (click)="refresh()">
          <i class="feather icon-refresh-cw me-1"></i>Refresh
        </button>
      </div>
    </div>
  </div>
  <div class="card table-card-modern">
    <div class="card-header border-0 bg-light py-3"><h5 class="mb-0 fw-semibold">Customer balances</h5></div>
    <div class="table-responsive">
      <table class="table table-modern table-hover mb-0">
        <thead><tr><th>Customer</th><th class="text-end">Opening</th><th class="text-end">Sales</th><th class="text-end">Receipts</th><th class="text-end">Balance</th></tr></thead>
        <tbody>
          <tr *ngFor="let c of customers">
            <td class="fw-semibold">{{ c.name }}</td>
            <td class="text-end">{{ c.opening | number }} AED</td>
            <td class="text-end">{{ c.sales | number }} AED</td>
            <td class="text-end">{{ c.receipts | number }} AED</td>
            <td class="text-end fw-bold">{{ c.balance | number }} AED</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
