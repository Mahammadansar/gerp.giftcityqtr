<div class="portal-content">
  <div class="row mb-4">
    <div class="col-12">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 page-header-modern">
        <div>
          <h2>{{ title }}</h2>
          <p class="text-muted mb-0">{{ subtitle }}</p>
        </div>
        <div class="d-flex align-items-center gap-2">
          <span class="text-muted small">As of {{ asOfDate }}</span>
          <button type="button" class="btn btn-outline-secondary btn-sm" (click)="refresh()">
            <i class="feather icon-refresh-cw me-1"></i>Refresh
          </button>
        </div>
      </div>
    </div>
  </div>
  <div class="row">
    <div class="col-md-6">
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-light border-0 py-3"><h5 class="mb-0 fw-semibold">Assets</h5></div>
        <div class="card-body">
          <table class="table table-modern mb-0">
            <tbody>
              <tr *ngFor="let a of assets"><td>{{ a.label }}</td><td class="text-end fw-semibold">{{ a.amount | number }} AED</td></tr>
              <tr class="border-top"><td class="fw-bold">Total Assets</td><td class="text-end fw-bold">{{ totalAssets | number }} AED</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
    <div class="col-md-6">
      <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-light border-0 py-3"><h5 class="mb-0 fw-semibold">Liabilities and Equity</h5></div>
        <div class="card-body">
          <table class="table table-modern mb-0">
            <tbody>
              <tr *ngFor="let l of liabilities"><td>{{ l.label }}</td><td class="text-end fw-semibold">{{ l.amount | number }} AED</td></tr>
              <tr *ngFor="let e of equity"><td>{{ e.label }}</td><td class="text-end fw-semibold">{{ e.amount | number }} AED</td></tr>
              <tr class="border-top"><td class="fw-bold">Total</td><td class="text-end fw-bold">{{ totalLiabilitiesAndEquity | number }} AED</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
