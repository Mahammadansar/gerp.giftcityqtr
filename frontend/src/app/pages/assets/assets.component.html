<div class="portal-content">
  <div class="row mb-4">
    <div class="col-12">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 page-header-modern">
        <div>
          <h2>{{ title }}</h2>
          <p class="text-muted mb-0">{{ subtitle }}</p>
        </div>
        <button type="button" class="btn btn-primary" (click)="toggleAddForm()">
        {{ showAddForm ? 'Cancel' : 'Add Asset' }}
      </button>
      </div>
    </div>
  </div>

  <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
  <div class="text-muted small mb-3" *ngIf="loading">Loading assets...</div>

  <div class="card border-0 shadow-sm mb-4" *ngIf="showAddForm">
    <div class="card-body">
      <h6 class="mb-3">Add asset</h6>
      <div class="row g-2 align-items-end">
        <div class="col-md-2"><input type="text" class="form-control form-control-sm" [(ngModel)]="form.name" placeholder="Name" /></div>
        <div class="col-md-2"><input type="text" class="form-control form-control-sm" [(ngModel)]="form.category" placeholder="Category" /></div>
        <div class="col-md-2"><input type="date" class="form-control form-control-sm" [(ngModel)]="form.purchaseDate" placeholder="Purchase date" /></div>
        <div class="col-md-2"><input type="number" class="form-control form-control-sm" [(ngModel)]="form.value" placeholder="Value" min="0" /></div>
        <div class="col-md-2"><button type="button" class="btn btn-sm btn-primary" (click)="saveAsset()" [disabled]="submitting">{{ submitting ? 'Saving...' : 'Save' }}</button></div>
      </div>
    </div>
  </div>
  <div class="card table-card-modern">
    <div class="card-header border-0 bg-light py-3">
      <h5 class="mb-0 fw-semibold">Fixed Assets</h5>
    </div>
    <div class="table-responsive">
      <table class="table table-modern table-hover mb-0">
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Category</th>
            <th>Purchase Date</th>
            <th class="text-end">Value (AED)</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let a of assets">
            <td><span class="ref-badge">{{ a.id }}</span></td>
            <td class="fw-semibold">{{ a.name }}</td>
            <td>{{ a.category }}</td>
            <td>{{ a.purchaseDate }}</td>
            <td class="text-end">{{ a.value | number }}</td>
            <td><span class="status-badge-modern status-approved">{{ a.status }}</span></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
