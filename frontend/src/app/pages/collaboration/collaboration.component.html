<div class="portal-content">
  <div class="row mb-4">
    <div class="col-12">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 page-header-modern">
        <div>
          <h2>{{ title }}</h2>
          <p class="text-muted mb-0">{{ subtitle }}</p>
        </div>
      </div>
    </div>
  </div>

  <div class="alert alert-danger" *ngIf="error">{{ error }}</div>
  <div class="text-muted small mb-3" *ngIf="loading">Loading messages...</div>

  <div class="card border-0 shadow-sm mb-4">
    <div class="card-body">
      <h6 class="mb-3">Send message</h6>
      <div class="row g-2 align-items-end">
        <div class="col-md-2"><input type="text" class="form-control form-control-sm" [(ngModel)]="newFrom" placeholder="Your name" /></div>
        <div class="col-md-6"><input type="text" class="form-control form-control-sm" [(ngModel)]="newText" placeholder="Message" (keyup.enter)="sendMessage()" /></div>
        <div class="col-md-2"><button type="button" class="btn btn-primary btn-sm" (click)="sendMessage()" [disabled]="submitting || !auth.canWrite('projects')">{{ submitting ? 'Sending...' : 'Send' }}</button></div>
      </div>
    </div>
  </div>

  <div class="card border-0 shadow-sm">
    <div class="card-header bg-light border-0 py-3">
      <h6 class="mb-0 fw-semibold">Messages</h6>
    </div>
    <div class="card-body p-0">
      <div class="list-group list-group-flush" *ngIf="messages.length; else noMessages">
        <div class="list-group-item d-flex align-items-start" *ngFor="let m of messages">
          <div class="thread-avatar me-3">{{ m.from.charAt(0) }}</div>
          <div class="flex-grow-1">
            <div class="d-flex justify-content-between">
              <span class="fw-semibold">{{ m.from }}</span>
              <span class="text-muted small">{{ m.time }}</span>
            </div>
            <div class="text-muted small">{{ m.text }}</div>
          </div>
        </div>
      </div>
      <ng-template #noMessages>
        <div class="p-4 text-center text-muted">No messages yet. Send one above.</div>
      </ng-template>
    </div>
  </div>
</div>
