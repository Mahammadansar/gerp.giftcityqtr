<div class="portal-content">
  <div class="row mb-4">
    <div class="col-12">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 page-header-modern">
        <div>
          <h2>{{ title }}</h2>
          <p class="text-muted mb-0">{{ subtitle }}</p>
        </div>
        <button type="button" class="btn btn-outline-secondary btn-sm" (click)="load()">
          <i class="feather icon-refresh-cw me-1"></i>Refresh
        </button>
      </div>
      <div class="alert alert-danger mt-3" *ngIf="error">{{ error }}</div>
    </div>
  </div>

  <div class="card table-card-modern">
    <div class="card-header border-0 bg-light py-3">
      <h5 class="mb-0 fw-semibold">Pending & Recent Approvals</h5>
    </div>
    <div class="table-responsive">
      <table class="table table-modern table-hover mb-0">
        <thead>
          <tr>
            <th>Type</th>
            <th>Reference</th>
            <th>Requester</th>
            <th class="text-end">Amount</th>
            <th>Date</th>
            <th>Status</th>
            <th class="text-end">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let a of items">
            <td>{{ a.type }}</td>
            <td><span class="ref-badge">{{ a.ref }}</span></td>
            <td>{{ a.requester }}</td>
            <td class="text-end fw-semibold">{{ a.amount | number }} {{ a.currency }}</td>
            <td>{{ a.date }}</td>
            <td>
              <span class="status-badge-modern" [ngClass]="{
                'status-pending': a.status === 'Pending',
                'status-approved': a.status === 'Approved',
                'status-rejected': a.status === 'Rejected'
              }">{{ a.status }}</span>
            </td>
            <td class="text-end">
              <button type="button" class="btn btn-sm btn-success me-1" (click)="approve(a)" *ngIf="a.status === 'Pending' && a.type === 'Purchase Order'">Approve</button>
              <button type="button" class="btn btn-sm btn-danger" (click)="reject(a)" *ngIf="a.status === 'Pending' && a.type === 'Purchase Order'">Reject</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
