<div class="portal-content">
  <!-- Page Header -->
  <div class="row mb-4">
    <div class="col-12">
      <div class="d-flex align-items-center justify-content-between page-header-modern">
        <div>
          <h2>Clients</h2>
          <p>Manage your client relationships and contacts</p>
        </div>
        <div class="d-flex align-items-center gap-3">
          <span class="text-muted text-sm">{{ filtered.length }} {{ filtered.length === 1 ? 'client' : 'clients' }}</span>
          <button class="btn btn-primary btn-modern">
            <i class="feather icon-plus me-2"></i>Add Client
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Search Card -->
  <div class="row mb-4">
    <div class="col-12">
      <div class="filters-card-modern">
        <div class="row g-3 align-items-end">
          <div class="col-md-8">
            <label class="form-label text-sm fw-semibold mb-2">Search Clients</label>
            <div class="input-group-modern">
              <span class="input-group-icon">
                <i class="feather icon-search"></i>
              </span>
              <input type="text" class="form-control form-control-modern" 
                     [(ngModel)]="q" 
                     placeholder="Search by name, phone, email, or segment...">
            </div>
          </div>
          <div class="col-md-4">
            <label class="form-label text-sm fw-semibold mb-2">View Options</label>
            <div class="d-flex gap-2">
              <button class="btn btn-outline-primary btn-sm active">
                <i class="feather icon-grid"></i>
              </button>
              <button class="btn btn-outline-primary btn-sm">
                <i class="feather icon-list"></i>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Clients Grid -->
  <div class="row g-4">
    <div class="col-xl-4 col-md-6 col-12" *ngFor="let c of filtered">
      <div class="client-card-modern">
        <div class="client-card-header">
          <div class="client-avatar-large">
            {{ c.name.charAt(0) }}
          </div>
          <div class="client-status" [ngClass]="'status-' + c.segment.toLowerCase()">
            <span class="status-dot"></span>
            {{ c.segment }}
          </div>
        </div>
        <div class="client-card-body">
          <h5 class="client-name mb-2">{{ c.name }}</h5>
          <div class="client-info">
            <div class="info-item">
              <i class="feather icon-phone text-primary"></i>
              <span>{{ c.phone }}</span>
            </div>
            <div class="info-item">
              <i class="feather icon-mail text-primary"></i>
              <a href="mailto:{{c.email}}" class="text-decoration-none">{{ c.email }}</a>
            </div>
          </div>
        </div>
        <div class="client-card-footer">
          <button class="btn btn-sm btn-outline-primary">
            <i class="feather icon-eye me-1"></i>View
          </button>
          <button class="btn btn-sm btn-outline-secondary">
            <i class="feather icon-edit me-1"></i>Edit
          </button>
          <button class="btn btn-sm btn-outline-info">
            <i class="feather icon-message-circle me-1"></i>Contact
          </button>
        </div>
      </div>
    </div>
    
    <!-- Empty State -->
    <div class="col-12" *ngIf="filtered.length === 0">
      <div class="empty-state-card">
        <i class="feather icon-users empty-icon"></i>
        <h5 class="mt-3 mb-2">No clients found</h5>
        <p class="text-muted mb-4">Try adjusting your search criteria</p>
        <button class="btn btn-primary">
          <i class="feather icon-plus me-2"></i>Add New Client
        </button>
      </div>
    </div>
  </div>
</div>
